      <li>Bachelor's in CS, Software Engineering, or related field</li>
      <li>Proficiency in Python and at least one systems language</li>
      <li>Experience with cloud platforms (AWS, GCP, or Azure)</li>
      <li>Familiarity with Docker and CI/CD practices</li>
