- title: "Certificate in AI-Powered Search & Information Retrieval"
  type: program
  school: "School of Applied Intelligence"
  degree_level: "Certificate"
  duration: "6 months"
  format: "Online / Hybrid"
  credits: "18 credits"
  prerequisites: |
    <p>Students should have:</p>
    <ul>
      <li>Web development or backend engineering experience</li>
      <li>Familiarity with REST APIs and JSON</li>
      <li>Basic Python or JavaScript</li>
      <li>Experience with any CMS or web platform helpful</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The Certificate in AI-Powered Search &amp; Information Retrieval is designed for developers, content strategists, and product teams who want to dramatically improve how users find information on websites and applications. The program covers the full arc from TF-IDF and BM25 through dense retrieval, hybrid search, and modern AI-enhanced search systems like <a href="https://tag1.com/scolta">Scolta</a>.</p>

    <h2>The Scolta Case Study</h2>
    <p>Throughout the program, students analyze and extend Scolta — Tag1 Consulting's AI-powered search enhancement that layers query expansion, semantic reranking, and AI-generated overviews onto existing search infrastructure without requiring vector databases or embedding pipelines. Scolta's architecture is used as the primary case study for practical, production-ready AI search.</p>

    <h2>Curriculum Highlights</h2>
    <ul>
      <li><strong>Classical IR:</strong> TF-IDF, BM25, inverted indexes, Pagefind and static site search</li>
      <li><strong>Neural IR:</strong> Dense retrieval (DPR, E5, BGE), bi-encoders vs. cross-encoders, semantic similarity</li>
      <li><strong>Query Understanding:</strong> Query expansion, spell correction, synonym expansion, AI-powered query rewriting</li>
      <li><strong>Hybrid Search:</strong> Combining lexical and semantic signals, reciprocal rank fusion, learned sparse retrieval (SPLADE)</li>
      <li><strong>AI Overviews &amp; Summarization:</strong> Using LLMs to synthesize search results, RAG for search, citation generation</li>
      <li><strong>Case Studies:</strong> Scolta on Drupal, Elasticsearch + LLM, Algolia AI, Typesense</li>
    </ul>

    <h2>Sample Courses</h2>
    <ul>
      <li>IR-101: Information Retrieval Fundamentals: BM25 to Modern Search</li>
      <li>IR-201: Neural Retrieval: Embeddings and Dense Search</li>
      <li>IR-210: Query Expansion and AI-Powered Query Understanding</li>
      <li>IR-220: Hybrid Search and Reranking</li>
      <li>IR-230: AI Overviews and Retrieval-Augmented Generation</li>
      <li>IR-290: Capstone: Deploy an AI-Enhanced Search System</li>
    </ul>
