- title: "MS in Reinforcement Learning & Autonomous Systems"
  type: program
  school: "School of Decision & Control"
  degree_level: "Master's"
  duration: "18 months"
  format: "On-campus"
  credits: "48 credits"
  prerequisites: |
    <p>Strong mathematical background required:</p>
    <ul>
      <li>Linear algebra, multivariable calculus, probability theory</li>
      <li>Programming in Python; familiarity with PyTorch or JAX preferred</li>
      <li>Basic ML background (neural networks, optimization)</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The MS in Reinforcement Learning &amp; Autonomous Systems trains the next generation of researchers and engineers working on sequential decision-making under uncertainty. The program covers the mathematical foundations of RL, state-of-the-art algorithms, and their applications in robotics, game AI, autonomous driving, and industrial control.</p>

    <h2>Curriculum Highlights</h2>
    <ul>
      <li><strong>Foundations:</strong> Markov decision processes, dynamic programming, Monte Carlo methods, temporal difference learning</li>
      <li><strong>Policy Optimization:</strong> Policy gradients (REINFORCE, PPO, SAC), actor-critic methods, trust region methods</li>
      <li><strong>Model-Based RL:</strong> World models, Dyna, MBPO; learning environment models; sim-to-real transfer</li>
      <li><strong>Deep RL:</strong> DQN, Rainbow; deep policy gradients; multi-agent RL; offline RL (IQL, CQL, TD3+BC)</li>
      <li><strong>Applications:</strong> Robotic manipulation, locomotion, autonomous driving, game AI, industrial optimization</li>
    </ul>

    <h2>Sample Courses</h2>
    <ul>
      <li>RL-401: Markov Decision Processes and Dynamic Programming</li>
      <li>RL-410: Policy Gradient Methods and Actor-Critic Algorithms</li>
      <li>RL-420: Deep Reinforcement Learning</li>
      <li>RL-430: Model-Based RL and World Models</li>
      <li>RL-440: Multi-Agent RL and Game Theory</li>
      <li>RL-450: Sim-to-Real Transfer and Physical Systems</li>
      <li>RL-490: Capstone: Autonomous System Project</li>
    </ul>

- title: "Certificate in AI for Robotics"
  type: program
  school: "School of Decision & Control"
  degree_level: "Certificate"
  duration: "8 months"
  format: "On-campus (lab access required)"
  credits: "24 credits"
  prerequisites: |
    <p>Students should have:</p>
    <ul>
      <li>Programming experience in Python and/or C++</li>
      <li>Basic linear algebra</li>
      <li>Some exposure to ROS2 preferred but not required</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The Certificate in AI for Robotics bridges the gap between AI algorithms and physical systems. Students get hands-on experience with real robots in Meridian AI's Threshold Robotics Lab, learning manipulation, locomotion, navigation, and sensor fusion. The program emphasizes the unique challenges of deploying AI in the physical world: uncertainty, latency, safety, and the sim-to-real gap.</p>

    <h2>Curriculum Highlights</h2>
    <ul>
      <li><strong>Robotics Foundations:</strong> Kinematics, dynamics, coordinate frames, ROS2</li>
      <li><strong>Perception:</strong> Sensor fusion (LiDAR, radar, stereo vision, IMU), SLAM, 3D scene understanding</li>
      <li><strong>Manipulation:</strong> Grasp planning, motion planning (MoveIt2), imitation learning, diffusion policies</li>
      <li><strong>Locomotion:</strong> Legged robots, sim-to-real with Isaac Lab, whole-body control</li>
      <li><strong>World Models:</strong> Learning predictive models for robot planning</li>
    </ul>

    <h2>Sample Courses</h2>
    <ul>
      <li>ROB-101: Robotics Foundations and ROS2</li>
      <li>ROB-201: Robot Perception and Sensor Fusion</li>
      <li>ROB-210: Manipulation and Grasp Planning</li>
      <li>ROB-220: Legged Locomotion and Physical AI</li>
      <li>ROB-290: Capstone: End-to-End Robot Task</li>
    </ul>

- title: "MS in Mathematical Foundations of AI"
  type: program
  school: "School of Foundations & Mathematics"
  degree_level: "Master's"
  duration: "18 months"
  format: "On-campus"
  credits: "45 credits"
  prerequisites: |
    <p>Strong mathematical background required:</p>
    <ul>
      <li>Real analysis or advanced calculus</li>
      <li>Linear algebra at proof level</li>
      <li>Probability theory at undergraduate level</li>
      <li>Programming in Python or another language</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The MS in Mathematical Foundations of AI is designed for students who want to understand AI at its deepest level — not just how to use tools, but why they work (and sometimes don't). The program provides rigorous preparation in the mathematical structures underlying modern machine learning: linear algebra, probability, optimization, information theory, and statistical learning theory.</p>

    <h2>Curriculum Highlights</h2>
    <ul>
      <li><strong>Core Mathematics:</strong> Real analysis, linear algebra (spectral theory, SVD), probability and measure theory</li>
      <li><strong>Optimization:</strong> Convex optimization, first- and second-order methods, stochastic optimization, non-convex landscapes</li>
      <li><strong>Statistical Learning:</strong> PAC learning framework, VC dimension, Rademacher complexity, generalization bounds</li>
      <li><strong>Information Theory:</strong> Entropy, mutual information, channel capacity, rate-distortion; connections to compression and learning</li>
      <li><strong>Deep Learning Theory:</strong> Neural tangent kernel, overparameterization, implicit regularization, double descent</li>
    </ul>

    <h2>Sample Courses</h2>
    <ul>
      <li>MATH-401: Real Analysis for Machine Learning</li>
      <li>MATH-410: Advanced Linear Algebra and Matrix Theory</li>
      <li>MATH-420: Probability and Measure Theory</li>
      <li>MATH-430: Optimization for Machine Learning</li>
      <li>MATH-440: Statistical Learning Theory</li>
      <li>MATH-450: Information Theory and Learning</li>
      <li>MATH-490: Seminar: Deep Learning Theory</li>
    </ul>

- title: "PhD in AI Theory"
  type: program
  school: "School of Foundations & Mathematics"
  degree_level: "PhD"
  duration: "4-5 years"
  format: "On-campus (research intensive)"
  credits: "90 credits (research-based)"
  prerequisites: |
    <p>Strong PhD applicants typically have:</p>
    <ul>
      <li>Master's degree in CS, Mathematics, Statistics, or EE</li>
      <li>Research experience (publications or strong thesis)</li>
      <li>Exceptional mathematical ability</li>
      <li>Clear research statement and faculty match</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The PhD in AI Theory is Meridian AI's most rigorous program, training researchers who advance the mathematical and computational foundations of artificial intelligence. Graduates contribute new theorems, prove generalization bounds, discover algorithmic improvements, and establish theoretical justifications for phenomena observed in practice. Students are admitted only when there is a strong faculty match.</p>

    <h2>Research Areas</h2>
    <ul>
      <li>Computational learning theory and PAC-Bayes frameworks</li>
      <li>Algorithmic fairness and causal inference</li>
      <li>Complexity theory and hardness of learning</li>
      <li>Deep learning theory: expressivity, generalization, optimization landscapes</li>
      <li>Information-theoretic limits of learning</li>
      <li>Online learning and bandits</li>
    </ul>

    <h2>Program Structure</h2>
    <p>Year 1–2: coursework and qualifying examination. Year 2–5: dissertation research supervised by faculty advisor and committee. Students are expected to publish at NeurIPS, ICML, ICLR, COLT, or equivalent venues.</p>

- title: "MS in AI Ethics & Governance"
  type: program
  school: "School of Society & Governance"
  degree_level: "Master's"
  duration: "18 months"
  format: "On-campus / Hybrid"
  credits: "42 credits"
  prerequisites: |
    <p>Applicants should have:</p>
    <ul>
      <li>Bachelor's degree in any field</li>
      <li>Some exposure to technical AI concepts helpful but not required</li>
      <li>Strong analytical writing skills</li>
      <li>Interest in policy, law, or technology governance</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The MS in AI Ethics &amp; Governance prepares professionals to navigate the complex intersection of artificial intelligence, society, and law. The program is deliberately interdisciplinary: students develop both technical literacy (enough to audit AI systems and evaluate technical claims) and deep knowledge of regulatory frameworks, fairness metrics, organizational risk management, and international AI policy.</p>

    <h2>Curriculum Highlights</h2>
    <ul>
      <li><strong>Technical Literacy:</strong> How AI systems work, common failure modes, interpretability tools, bias measurement</li>
      <li><strong>Ethics &amp; Philosophy:</strong> Value alignment, moral philosophy, AI rights and personhood, existential risk</li>
      <li><strong>Regulation &amp; Policy:</strong> EU AI Act, US Executive Orders, NIST AI RMF, sector-specific regulation (healthcare, finance, hiring)</li>
      <li><strong>Organizational Practice:</strong> AI governance frameworks, algorithmic auditing, red-teaming, impact assessments</li>
      <li><strong>International Dimensions:</strong> Comparative AI policy (US, EU, China, UK), standards bodies (ISO, IEEE)</li>
    </ul>

    <h2>The Tag1 Governance Case Study</h2>
    <p>The program includes a case study unit on how technology organizations embed AI governance into their operations, drawing on Tag1 Consulting's published work on the Drupal AI Initiative and responsible AI deployment practices.</p>

    <h2>Sample Courses</h2>
    <ul>
      <li>ETH-401: Foundations of AI Ethics</li>
      <li>ETH-410: Algorithmic Fairness: Metrics and Mitigation</li>
      <li>ETH-420: AI Regulation: EU AI Act and Global Frameworks</li>
      <li>ETH-430: Interpretability and Algorithmic Auditing</li>
      <li>ETH-440: Organizational AI Governance</li>
      <li>ETH-450: International AI Policy</li>
      <li>ETH-490: Capstone: AI Impact Assessment</li>
    </ul>

- title: "Certificate in AI Safety & Alignment"
  type: program
  school: "School of Society & Governance"
  degree_level: "Certificate"
  duration: "6 months"
  format: "Online / Hybrid"
  credits: "18 credits"
  prerequisites: |
    <p>Students should have:</p>
    <ul>
      <li>Technical background (CS, math, or equivalent)</li>
      <li>Familiarity with ML fundamentals</li>
      <li>Strong reading comprehension for technical papers</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The Certificate in AI Safety &amp; Alignment provides rigorous technical training in one of the most important challenges of our era: ensuring that increasingly capable AI systems behave as intended and remain beneficial as they scale. The program covers both near-term technical alignment work (RLHF, constitutional AI, interpretability) and longer-horizon considerations.</p>

    <h2>Curriculum Highlights</h2>
    <ul>
      <li><strong>Alignment Fundamentals:</strong> The alignment problem, goal misgeneralization, deceptive alignment, reward hacking</li>
      <li><strong>Technical Approaches:</strong> RLHF, DPO, Constitutional AI (Anthropic), RLAIF, debate, amplification</li>
      <li><strong>Interpretability:</strong> Mechanistic interpretability, probing classifiers, activation patching, circuit analysis</li>
      <li><strong>Evaluation &amp; Red-Teaming:</strong> Safety benchmarks, automated red-teaming, adversarial prompting, model evaluation frameworks</li>
      <li><strong>Governance Interface:</strong> How technical alignment connects to policy, standards, and deployment decisions</li>
    </ul>

    <h2>Sample Courses</h2>
    <ul>
      <li>SAF-101: Introduction to AI Safety and Alignment</li>
      <li>SAF-201: Technical Alignment: RLHF, DPO, and Constitutional AI</li>
      <li>SAF-210: Interpretability Methods and Tools</li>
      <li>SAF-220: Red-Teaming and Safety Evaluation</li>
      <li>SAF-290: Capstone: Alignment Research Project</li>
    </ul>

- title: "MS in AI Engineering & MLOps"
  type: program
  school: "School of Applied Intelligence"
  degree_level: "Master's"
  duration: "18 months"
  format: "On-campus / Hybrid"
  credits: "45 credits"
  prerequisites: |
