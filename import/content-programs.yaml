  body: |
    <h2>Program Overview</h2>
    <p>The MS in AI Engineering &amp; MLOps addresses the gap between AI research and production systems. Most AI projects fail not because the models are bad, but because the infrastructure, monitoring, and organizational processes aren't in place to support them. This program trains engineers who can close that gap — building the pipelines, platforms, and practices that turn research prototypes into reliable production AI.</p>

    <h2>Curriculum Highlights</h2>
    <ul>
      <li><strong>Data Engineering:</strong> Feature stores, data versioning (DVC, LakeFS), data quality, streaming data for ML</li>
      <li><strong>Training Infrastructure:</strong> Distributed training, experiment tracking (MLflow, W&amp;B), hyperparameter optimization, compute cost management</li>
      <li><strong>Model Serving:</strong> Triton, vLLM, TGI, BentoML; latency optimization; autoscaling; A/B testing AI features</li>
      <li><strong>Monitoring &amp; Observability:</strong> Data drift detection, model degradation, performance monitoring, alerting</li>
      <li><strong>Platform Engineering:</strong> Kubernetes for ML, Kubeflow, Vertex AI, SageMaker; CI/CD for ML pipelines</li>
    </ul>

    <h2>Sample Courses</h2>
    <ul>
      <li>MLE-401: ML Systems Design Fundamentals</li>
      <li>MLE-410: Data Engineering for ML</li>
      <li>MLE-420: Distributed Training and Compute Optimization</li>
      <li>MLE-430: Model Serving and Inference Infrastructure</li>
      <li>MLE-440: ML Monitoring, Observability, and Reliability</li>
      <li>MLE-450: Platform Engineering for AI: Kubernetes and Cloud</li>
      <li>MLE-490: Capstone: End-to-End ML Platform</li>
