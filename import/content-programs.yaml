# Meridian AI — 12 Degree Programs

- title: "MS in Large Language Model Engineering"
  type: program
  school: "School of Language & Reasoning"
  degree_level: "Master's"
  duration: "18 months (3 semesters)"
  format: "On-campus / Hybrid"
  credits: "45 credits"
  prerequisites: |
    <p>Applicants should have:</p>
    <ul>
      <li>Bachelor's degree in Computer Science, Mathematics, or related field</li>
      <li>Programming proficiency in Python (required) or Rust (beneficial)</li>
      <li>Linear algebra and probability at the undergraduate level</li>
      <li>Familiarity with basic machine learning concepts</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The MS in Large Language Model Engineering is the flagship program of the School of Language &amp; Reasoning. Students gain deep, hands-on expertise in the full LLM lifecycle: from tokenization and architecture design through pretraining, fine-tuning, alignment, and production deployment. Graduates leave Meridian AI equipped to build and ship language model systems at scale.</p>

    <h2>What You Will Learn</h2>
    <p>The curriculum is organized around the LLM engineering stack:</p>
    <ul>
      <li><strong>Foundations:</strong> Tokenization (BPE, WordPiece, SentencePiece), transformer architectures (GPT, BERT, T5 families), attention mechanisms, positional encoding</li>
      <li><strong>Training:</strong> Dataset curation, pretraining at scale, distributed training (FSDP, DeepSpeed), mixed precision, gradient checkpointing</li>
      <li><strong>Alignment:</strong> RLHF, DPO, Constitutional AI, reward modeling, red-teaming</li>
      <li><strong>Inference:</strong> Quantization (GPTQ, AWQ, GGUF), speculative decoding, KV-cache optimization, serving with vLLM and TGI</li>
      <li><strong>Applications:</strong> RAG systems, function calling, multi-agent architectures, MCP integration</li>
    </ul>

    <h2>Feste Curriculum Thread</h2>
    <p>A distinctive feature of this program is the <em>Feste thread</em>: a semester-long implementation project using Tag1 Consulting's open-source Rust LLM engine as the primary teaching vehicle. Students work through the Feste blog series (Parts 1–4, published at tag1.com/how-to/) and extend it with their own modifications. This hands-on approach — reading actual production code, not toy examples — is one of the things Meridian AI graduates say most distinguishes their education.</p>

    <h2>Career Outcomes</h2>
    <p>Graduates enter roles as ML engineers, LLM platform engineers, applied research scientists, and AI infrastructure leads at technology companies, AI labs, and enterprise organizations. Median starting salary for the MS class of 2025: $178,000.</p>

    <h2>Sample Courses</h2>
    <ul>
      <li>LLM-401: Transformer Architecture and Attention Mechanisms</li>
      <li>LLM-402: Tokenization, Vocabulary, and Encoding Schemes</li>
      <li>LLM-410: Large-Scale Pretraining: Data, Compute, and Infrastructure</li>
      <li>LLM-420: Fine-Tuning and Parameter-Efficient Adaptation (LoRA, QLoRA)</li>
      <li>LLM-430: Alignment: RLHF, DPO, and Constitutional AI</li>
      <li>LLM-440: Inference Optimization and Deployment</li>
      <li>LLM-450: Agentic Systems and Multi-Agent Orchestration</li>
      <li>LLM-490: Capstone: Build and Ship an LLM Application</li>
    </ul>

- title: "Certificate in AI Agent Development"
  type: program
  school: "School of Language & Reasoning"
  degree_level: "Certificate"
  duration: "6 months (2 quarters)"
  format: "Online / Hybrid"
  credits: "18 credits"
  prerequisites: |
    <p>Students should have:</p>
    <ul>
      <li>Working knowledge of Python</li>
      <li>Basic familiarity with REST APIs and JSON</li>
      <li>Some exposure to LLM APIs (OpenAI, Anthropic, or similar)</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The Certificate in AI Agent Development focuses on the rapidly growing field of autonomous AI systems. Students learn to design, build, and deploy agents that use tools, maintain memory, plan multi-step tasks, and collaborate with other agents. The program covers both the conceptual foundations and the practical toolchains: Claude Agent SDK, LangChain/LangGraph, the Model Context Protocol (MCP), and real-world deployment patterns.</p>

    <h2>What You Will Learn</h2>
    <ul>
      <li><strong>Agent Architecture:</strong> ReAct, plan-and-execute, reflection, and tool-use patterns</li>
      <li><strong>Tool Integration:</strong> Function calling, MCP servers, web search, code execution, database access</li>
      <li><strong>Memory Systems:</strong> Short-term context windows, long-term vector stores, episodic memory</li>
      <li><strong>Multi-Agent Orchestration:</strong> Supervisor patterns, handoffs, CrewAI, AutoGen, LangGraph flows</li>
      <li><strong>Production Deployment:</strong> Rate limits, cost management, monitoring, error handling, human-in-the-loop</li>
    </ul>

    <h2>Industry Focus</h2>
    <p>This certificate is designed for practicing software engineers and technical product managers who need to add AI agent capabilities to their teams' output. The curriculum emphasizes getting working systems into production quickly, not theoretical foundations. By the end of the program, students will have built and deployed at least three complete agent applications.</p>

    <h2>Sample Courses</h2>
    <ul>
      <li>AGT-101: Foundations of AI Agents: Tools, Memory, Planning</li>
      <li>AGT-201: Building with the Claude Agent SDK</li>
      <li>AGT-202: LangGraph and Complex Agent Workflows</li>
      <li>AGT-210: Model Context Protocol: Building and Consuming MCP Servers</li>
      <li>AGT-290: Capstone: Deploy a Production AI Agent</li>
    </ul>

- title: "MS in Computer Vision & Visual AI"
  type: program
  school: "School of Perception & Synthesis"
  degree_level: "Master's"
  duration: "18 months"
  format: "On-campus"
  credits: "45 credits"
  prerequisites: |
    <p>Applicants should have:</p>
    <ul>
      <li>Bachelor's degree in CS, EE, Mathematics, or Physics</li>
      <li>Linear algebra and multivariable calculus</li>
      <li>Python programming proficiency</li>
      <li>Basic statistics and probability</li>
    </ul>
  body: |
    <h2>Program Overview</h2>
    <p>The MS in Computer Vision &amp; Visual AI trains students to build systems that see and understand the world. The program covers the full arc from classical image processing through deep learning-based detection and segmentation to the latest vision foundation models. Students work with real visual data pipelines and build applications ranging from autonomous driving perception stacks to medical image analysis systems.</p>

    <h2>Curriculum Highlights</h2>
    <ul>
      <li><strong>Classical Foundations:</strong> Image formation, edge detection, optical flow, feature extraction (SIFT, ORB)</li>
      <li><strong>Deep Learning for Vision:</strong> CNNs, ResNets, EfficientNet; object detection (YOLO, DETR); instance segmentation; semantic segmentation</li>
      <li><strong>Vision Transformers:</strong> ViT, DINO, DINOv2, SAM; CLIP and vision-language models</li>
      <li><strong>Video Understanding:</strong> Temporal models, optical flow estimation, activity recognition</li>
      <li><strong>3D Vision:</strong> NeRF, 3D Gaussian splatting, depth estimation, point clouds</li>
      <li><strong>Applications:</strong> Autonomous driving, medical imaging, augmented reality, robotic perception</li>
    </ul>

    <h2>Sample Courses</h2>
    <ul>
      <li>CV-401: Image Formation and Classical Computer Vision</li>
      <li>CV-410: Convolutional Neural Networks for Vision</li>
      <li>CV-420: Vision Transformers and Foundation Models</li>
      <li>CV-430: Object Detection and Instance Segmentation</li>
      <li>CV-440: Video Understanding and Temporal Models</li>
      <li>CV-450: 3D Vision: NeRF, Point Clouds, and Depth Estimation</li>
      <li>CV-460: Vision-Language Models and Multimodal AI</li>
      <li>CV-490: Capstone: Visual AI Application</li>
    </ul>

