  body: |
    <h2>Beyond Technical Controls</h2>
    <p>Much AI governance discussion focuses on technical solutions: better training, bias metrics, interpretability tools. These are necessary. But technical controls alone are insufficient without organizational processes that ensure AI systems are reviewed, approved, monitored, and adjusted throughout their lifecycle. This article examines how organizations build the governance layer — the processes, roles, and structures that give technical controls teeth.</p>

    <h2>The AI Governance Lifecycle</h2>
    <p>AI governance operates throughout the system lifecycle, not just at deployment:</p>
    <ol>
      <li><strong>Intake and scoping:</strong> Before development begins, assess whether AI is appropriate for this use case. Who are the affected stakeholders? What could go wrong? What are the regulatory requirements?</li>
      <li><strong>Development oversight:</strong> Track training data provenance, document model architecture choices, maintain evaluation results throughout development.</li>
      <li><strong>Pre-deployment review:</strong> Technical red-teaming, fairness auditing, stakeholder review, legal clearance. Often a formal "go/no-go" gate.</li>
      <li><strong>Deployment monitoring:</strong> Continuous monitoring for performance degradation, distribution shift, and harm reports.</li>
      <li><strong>Incident response:</strong> Defined procedures for when something goes wrong — escalation paths, rollback procedures, communication protocols.</li>
    </ol>

    <h2>Roles and Responsibilities</h2>
    <p>Effective AI governance requires explicit role definition:</p>
    <ul>
      <li><strong>AI Risk Owner:</strong> Business owner accountable for the AI system's outcomes, typically a senior leader with relevant domain authority.</li>
      <li><strong>AI Ethics Review Board:</strong> Cross-functional group (legal, privacy, technical, domain experts, sometimes external stakeholders) that reviews high-risk AI systems before deployment.</li>
      <li><strong>AI Safety Officer:</strong> Technical role responsible for implementing and monitoring AI safety standards.</li>
      <li><strong>Red Team:</strong> Independent team tasked with finding failures. Should not include people who built the system.</li>
    </ul>
    <p>Tag1 Consulting's work on integrating AI governance into the Drupal ecosystem — documented in their blog post on joining the Drupal AI Initiative (tag1.com/blog/tag1-joins-drupal-ai-initiative/) — provides a case study of how open-source communities can build governance processes that scale across many independent deployers. The challenge is real: how do you ensure governance for AI features in a CMS that thousands of organizations use independently? The answer involves a combination of technical guardrails, documentation standards, and community review processes.</p>

    <h2>Model Cards and System Cards</h2>
    <p>Model cards (Mitchell et al., 2019) are structured documentation templates that communicate key information about a model: intended use, performance across groups, limitations, and ethical considerations. System cards extend this to full AI systems. Both are increasingly required by regulators (EU AI Act's transparency obligations) and expected by enterprise customers as part of vendor due diligence.</p>
    <p>Creating a meaningful model card requires doing the underlying work: evaluation on diverse subpopulations, documentation of training data sources and quality, identification of failure modes. Organizations that treat model cards as checkbox exercises produce documentation that fails the purpose. Organizations that treat them as a forcing function for rigorous evaluation produce documentation that is genuinely useful.</p>
