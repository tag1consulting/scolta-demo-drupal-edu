- title: "Beyond LLMs: Why Reinforcement Learning Matters More Than Ever"
  type: resource_article
  school: "School of Decision & Control"
  difficulty: "Introductory"
  related_program_title: "MS in Reinforcement Learning & Autonomous Systems"
  topics:
    - "Reinforcement Learning"
  body: |
    <h2>The LLM Shadow</h2>
    <p>Since ChatGPT launched in late 2022, large language models have dominated AI discussions. Budgets, talent, and media attention have concentrated on text and image generation. But reinforcement learning — the framework for training agents through trial and reward — has been quietly having one of its most productive periods ever. Understanding why requires stepping back from the current hype cycle.</p>

    <h2>What RL Is That LLMs Aren't</h2>
    <p>Language models are trained on static data: text that was written before training began. They're optimized to predict the next token, which is a powerful proxy for many tasks but doesn't directly optimize for taking actions in the world. Reinforcement learning trains on experience: an agent takes actions, observes outcomes, receives rewards, and adjusts its behavior to maximize cumulative reward over time.</p>
    <p>This distinction matters for any task that requires: sequential decision-making (where current actions affect future options), optimization against sparse rewards (the right answer isn't evident until many steps later), physical interaction (robots don't get "next token" feedback), or discovering strategies humans haven't thought of.</p>

    <h2>RL Inside LLMs</h2>
    <p>Ironically, the biggest recent advance in LLMs — alignment via RLHF — is reinforcement learning. The "RL" in RLHF is used to train language models to be more helpful and less harmful. DeepSeek R1's chain-of-thought reasoning was discovered through reinforcement learning from outcome-based rewards. OpenAI's o1 and o3 models use RL-based inference-time scaling. RL is the core technology enabling the most capable aspects of modern language models.</p>

    <h2>Physical AI: The Next Frontier</h2>
    <p>Physical AI — robots that can perform complex manipulation and locomotion in unstructured environments — requires RL at its core. Boston Dynamics, Figure, Physical Intelligence (Pi), and 1X Technologies are all investing heavily in RL-based control. The sim-to-real pipeline (train in simulation, deploy in the real world) has matured dramatically: models trained entirely in simulation now control real robots with sub-second response times and human-competitive dexterity on specific tasks.</p>

    <h2>AlphaFold 2 and Scientific Discovery</h2>
    <p>AlphaFold 2, which solved the 50-year-old protein structure prediction problem, used a combination of transformer architecture and evolutionary data — but the refinement and confidence calibration components relied on RL-style iterative optimization. This is characteristic of RL's role in scientific AI: enabling optimization toward complex, hard-to-specify objectives.</p>

    <h2>Recommendation and Control Systems</h2>
    <p>The systems that most people interact with most often — content recommendation, ad placement, logistics routing, trading algorithms — are RL systems. YouTube's recommendation system optimizes watch time (a reward signal) through bandit-style RL. Uber's pricing is a contextual bandit. FedEx's route optimization uses deep RL. These systems are less glamorous than image generation but more economically significant.</p>
    <p>Anyone building AI applications beyond text generation will likely encounter reinforcement learning sooner or later. Meridian AI's MS in Reinforcement Learning &amp; Autonomous Systems prepares students for exactly this landscape.</p>

- title: "World Models: Teaching AI to Simulate Reality"
  type: resource_article
  school: "School of Decision & Control"
  difficulty: "Advanced"
  related_program_title: "MS in Reinforcement Learning & Autonomous Systems"
  topics:
    - "Reinforcement Learning"
  body: |
    <h2>What Is a World Model?</h2>
    <p>A world model is a learned simulator: a neural network that can predict what the world will look like after the agent takes an action, without requiring the real environment to run. Rather than learning purely from trial and error in the actual environment (model-free RL), model-based RL uses a learned model of the environment dynamics to plan, imagine, and train without as much real-world interaction.</p>
    <p>The idea is appealing: humans don't need to physically try every option before making a decision. We mentally simulate likely outcomes, predict which actions are dangerous before taking them, and plan complex sequences of actions by reasoning in our heads. World models aim to give AI agents similar capabilities.</p>

    <h2>DreamerV3: A Modern World Model</h2>
    <p>DreamerV3 (Hafner et al., 2023) is the current state of the art in model-based RL. Its architecture has three components: a Recurrent State Space Model (RSSM) that learns to predict the next state from current state and action; an encoder that maps observations to the latent state; and a decoder that maps latent states back to observations (for visualization and auxiliary objectives).</p>
    <p>DreamerV3's key claim: a single model that works across 150+ diverse tasks spanning Atari, continuous control, 3D environments, and robotics — trained only from reward and visual observations, without task-specific architecture changes. This generality is significant; earlier model-based methods typically required extensive tuning for each domain.</p>

    <h2>Planning in Latent Space</h2>
    <p>With a world model, the agent can plan entirely in latent space — imagining trajectories without rendering them, evaluating potential future states cheaply, and backpropagating gradients through simulated trajectories. This dramatically improves sample efficiency: the agent can make thousands of imagined decisions for every real-world step. DreamerV3 typically achieves human-level performance on Atari in 200M imagined steps, corresponding to only 20M real environment steps.</p>

    <h2>Challenges: Distribution Shift and Compounding Errors</h2>
    <p>World models have a fundamental challenge: they're trained on the agent's current behavior, but used to plan future behavior that may be very different. Predictions become increasingly inaccurate for plans that explore regions of state space the agent hasn't visited. Small errors in each prediction step compound: after 50 steps, a 1% per-step error rate can produce completely unrealistic imagined trajectories.</p>
    <p>Practical mitigations: use short planning horizons (avoid compounding errors over many steps); maintain an ensemble of world models and only use states where models agree; use uncertainty-aware planning that treats high-disagreement regions as dangerous.</p>

    <h2>Application to Robotics</h2>
    <p>World models are particularly powerful for robotics, where real-world interaction is expensive and sometimes dangerous. The Threshold Robotics Lab at Meridian AI uses a world model approach: train in simulation, use the world model to bridge the sim-to-real gap, and only collect real-world data for fine-tuning the world model to capture reality's deviations from simulation. This pipeline reduces the required real-world robot interactions by 10-100× compared to purely model-free approaches.</p>

- title: "Policy Gradients: The Math Behind Modern RL"
  type: resource_article
  school: "School of Decision & Control"
  difficulty: "Advanced"
  related_program_title: "MS in Reinforcement Learning & Autonomous Systems"
  topics:
    - "Reinforcement Learning"
    - "Mathematics & Foundations"
  body: |
    <h2>The Optimization Problem</h2>
    <p>Reinforcement learning seeks to maximize expected cumulative reward. Formally: find a policy π(a|s) — a probability distribution over actions given states — that maximizes:</p>
    <pre><code>J(π) = E[Σ_t γ^t r_t | π]</code></pre>
    <p>Where γ is the discount factor and r_t is the reward at time t. Policy gradient methods optimize J directly by computing its gradient with respect to the policy parameters and ascending the gradient — standard optimization, but for this specific objective.</p>

    <h2>The Policy Gradient Theorem</h2>
    <p>The key result (Sutton et al., 1999) shows how to compute ∇J(π) without knowing the environment dynamics:</p>
    <pre><code>∇J(π_θ) = E[Q^π(s,a) ∇ log π_θ(a|s)]</code></pre>
    <p>Where Q^π(s,a) is the action-value function under π. This tells us: the gradient of expected return equals the expected gradient of the log-policy, weighted by the action-value. Intuitively: increase the probability of actions that lead to high value, decrease the probability of actions that lead to low value.</p>
    <p>This "likelihood ratio" trick is fundamental: it allows us to differentiate through expectations of functions of samples from the policy, even though we don't know the environment dynamics that generate the rewards.</p>

    <h2>REINFORCE and Its Problems</h2>
    <p>REINFORCE (Williams, 1992) estimates Q^π with Monte Carlo returns: complete an episode, compute the total return from each state-action pair, use these as estimates. Simple but very high variance: returns are noisy because many other actions in the episode affect the total return. High variance means slow, unstable learning.</p>

    <h2>Actor-Critic Methods</h2>
    <p>Actor-critic methods reduce variance by using a learned value function (the "critic") to estimate Q^π rather than Monte Carlo returns. The critic is trained to minimize TD error; the actor uses the critic's estimates to compute policy gradients. This significantly reduces variance at the cost of introducing bias from the critic's approximation errors.</p>
    <p>A2C/A3C (Asynchronous Advantage Actor-Critic) uses A^π(s,a) = Q^π(s,a) - V^π(s) (the "advantage" — how much better is this action than average?) as the policy gradient weight, further reducing variance. PPO (Proximal Policy Optimization) adds a clipping constraint that prevents the policy from changing too much in any single update, dramatically improving stability. PPO is the current default algorithm for most RL applications including RLHF.</p>

    <h2>SAC: Entropy Maximization</h2>
    <p>SAC (Soft Actor-Critic) adds an entropy term to the objective: the policy should not only maximize expected return but also maximize entropy (stay as random as possible while still achieving high reward). This encourages exploration, prevents premature convergence to suboptimal deterministic policies, and improves robustness. SAC is the dominant algorithm for continuous control tasks in robotics and simulation.</p>

- title: "Sim-to-Real: Training Robots in Virtual Worlds"
  type: resource_article
  school: "School of Decision & Control"
  difficulty: "Advanced"
  related_program_title: "Certificate in AI for Robotics"
  topics:
    - "Robotics"
    - "Reinforcement Learning"
  body: |
    <h2>The Training Data Problem for Robots</h2>
    <p>Neural network training requires data — lots of it. A robot learning to walk might need to attempt the task millions of times before achieving consistent performance. In the real world, a million attempts would take months, wear out hardware, and likely involve many destructive falls. Simulation solves this: in a physics simulator, a million training steps might take hours, cost nothing in hardware, and enable parallel training across hundreds of virtual instances simultaneously.</p>
    <p>The catch is the "reality gap": simulated environments are approximations. Physics simulators don't perfectly model friction, contact dynamics, material deformation, or sensor noise. A policy trained in simulation may fail when deployed on real hardware because the simulator was wrong about something important.</p>

    <h2>Domain Randomization</h2>
    <p>The dominant technique for crossing the reality gap is domain randomization: randomize the simulation parameters during training so the robot learns a policy that works across a wide distribution of environments, rather than the specific parameters of any single simulator. Randomize: physics parameters (friction, mass, inertia), visual parameters (lighting, texture, camera noise), and dynamic parameters (actuator delays, gravity magnitude, object placement).</p>
    <p>The intuition: if the simulation distribution includes the real world (or is close to it), the policy trained on the distribution will work in reality. More specifically: the real environment is just one more point in the distribution the policy has been trained to handle.</p>
    <p>Dr. Chakraborty's lab at Meridian AI has developed adaptive domain randomization — automatically adjusting which parameters to randomize and by how much based on the difficulty of the current training step, prioritizing parameters that actually affect task performance.</p>

    <h2>Isaac Lab and GPU-Accelerated Simulation</h2>
    <p>NVIDIA's Isaac Lab enables GPU-accelerated physics simulation, running thousands of robot environments in parallel on a single A100. This changes the economics: a sim-to-real training run that previously took weeks now takes hours. The quality of the physics simulation has also improved dramatically: contact dynamics, deformable objects, and fluid simulation are now fast enough to use in training loops.</p>

    <h2>Privileged Information and Asymmetric Actor-Critic</h2>
    <p>A clever sim-to-real technique: during training, give the policy access to information that's available in simulation (exact contact forces, precise state of hidden objects) but not in the real world. This "privileged information" makes the training problem easier and produces better policy networks. At deployment, train a "student" policy that maps only real-sensor observations to the actions the privileged "teacher" would take. The student learns to infer what the teacher knew directly.</p>

    <h2>Results at Meridian AI</h2>
    <p>The Threshold Robotics Lab's work on indoor navigation (Project: Indoor Navigation with World Models) has achieved 87% success on novel layouts in sim-to-real transfer using this approach. For manipulation tasks, the lab's diffusion policy implementation achieves sub-centimeter grasping accuracy on objects seen only in simulation during training. These results indicate that the sim-to-real gap has narrowed to the point where many practical tasks can be solved entirely in simulation.</p>

