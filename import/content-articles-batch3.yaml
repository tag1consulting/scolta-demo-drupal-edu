- title: "The EU AI Act Explained: What Developers Need to Know"
  type: resource_article
  school: "School of Society & Governance"
  difficulty: "Introductory"
  related_program_title: "MS in AI Ethics & Governance"
  topics:
    - "Ethics & Governance"
  body: |
    <h2>The World's First Comprehensive AI Law</h2>
    <p>The EU AI Act, which entered into force in August 2024, is the world's first comprehensive regulatory framework for artificial intelligence. If you develop, deploy, or use AI systems in ways that affect people in the European Union — even if your company is headquartered elsewhere — you need to understand it. This article provides a practical overview for developers and technical teams.</p>

    <h2>The Risk-Based Framework</h2>
    <p>The Act organizes AI systems into four risk tiers:</p>
    <ul>
      <li><strong>Prohibited AI:</strong> Flatly banned. Includes: real-time biometric surveillance in public spaces (limited exceptions), social scoring systems, exploitation of vulnerabilities, emotion recognition in workplaces and schools, AI that manipulates behavior through subliminal techniques.</li>
      <li><strong>High-risk AI:</strong> Permitted but heavily regulated. Includes: safety components of critical infrastructure, AI in medical devices, biometric identification, AI in employment decisions, credit scoring, immigration, law enforcement, judicial decisions. Must meet requirements for data governance, transparency, human oversight, accuracy, and robustness. Must register in an EU database before deployment.</li>
      <li><strong>Limited risk AI:</strong> Transparency obligations. Chatbots must disclose that users are talking to AI. Deepfakes must be labeled. No substantive pre-deployment requirements.</li>
      <li><strong>Minimal risk AI:</strong> AI spam filters, AI chess games, etc. No additional obligations.</li>
    </ul>

    <h2>General Purpose AI (GPAI) Models</h2>
    <p>A significant addition to the Act covers "general-purpose AI models" — foundation models like GPT-4, Claude, and Llama. All GPAI models must: provide technical documentation, comply with EU copyright law, publish summaries of training data. "Systemic risk" GPAI models (those above 10^25 FLOPs training compute threshold, roughly GPT-4-scale and above) have additional obligations: mandatory adversarial testing, incident reporting, cybersecurity measures, energy efficiency reporting.</p>

    <h2>Key Compliance Timelines</h2>
    <ul>
      <li><strong>February 2025:</strong> Prohibited AI provisions apply</li>
      <li><strong>August 2025:</strong> GPAI model provisions apply</li>
      <li><strong>August 2026:</strong> High-risk AI provisions apply</li>
      <li><strong>August 2027:</strong> Full Act in force (including high-risk AI in Annex I sectors)</li>
    </ul>

    <h2>Practical Implications for Developers</h2>
    <p>If you build AI for the EU market:</p>
    <ol>
      <li>Classify your AI systems by risk tier — this determines your obligations</li>
      <li>If high-risk: implement conformity assessment procedures before deployment</li>
      <li>If GPAI: ensure documentation and copyright compliance in training data</li>
      <li>For any AI: implement basic transparency (users should know they're interacting with AI)</li>
      <li>Appoint an EU representative if you're based outside the EU</li>
    </ol>
    <p>The EU AI Office has released implementation guidance, and the NIST AI RMF provides a compatible US framework. ETH-420 at Meridian AI covers the full regulatory landscape in depth.</p>

- title: "Algorithmic Bias: Measurement, Mitigation, and the Limits of Both"
  type: resource_article
  school: "School of Society & Governance"
  difficulty: "Intermediate"
  related_program_title: "MS in AI Ethics & Governance"
  topics:
    - "Ethics & Governance"
  body: |
    <h2>What Algorithmic Bias Is (and Isn't)</h2>
    <p>Algorithmic bias occurs when an AI system produces systematically different outcomes for different groups — by race, gender, age, disability status, or other protected characteristics — in ways that are harmful or unfair. It's not a software bug (most bias arises from statistically correct learning on biased data) and it's not always intentional. But it can have devastating real-world consequences: loans not approved, jobs not offered, medical conditions not detected, people misidentified by law enforcement.</p>

    <h2>Sources of Bias</h2>
    <p>Bias enters AI systems through multiple channels:</p>
    <ul>
      <li><strong>Historical bias:</strong> Training data reflects past discrimination. A hiring model trained on historical hiring decisions will perpetuate the historical preference for certain demographics.</li>
      <li><strong>Representation bias:</strong> Some groups are underrepresented in training data. Facial recognition trained mostly on lighter-skinned faces performs worse on darker-skinned faces.</li>
      <li><strong>Measurement bias:</strong> The labels themselves are biased. "Creditworthy" labels assigned by human loan officers with their own biases produce a biased dataset.</li>
      <li><strong>Feedback loops:</strong> Predictions affect the data collected for future training. Predictive policing sends more police to over-policed neighborhoods, generating more arrests there, training the model to continue over-policing them.</li>
    </ul>

    <h2>Fairness Metrics</h2>
    <p>Multiple statistical definitions of fairness exist, and they measure different things:</p>
    <ul>
      <li><strong>Demographic parity:</strong> Equal positive prediction rates across groups. Controversial because it requires ignoring actual differences in the outcome variable.</li>
      <li><strong>Equalized odds:</strong> Equal true positive rates AND equal false positive rates across groups. Ensures that both errors are distributed equally.</li>
      <li><strong>Equal opportunity:</strong> Equal true positive rates only. Focus on ensuring that qualified individuals get equal consideration.</li>
      <li><strong>Calibration:</strong> Equal accuracy within each group. Ensures risk scores mean the same thing for different groups.</li>
    </ul>
    <p>The impossibility result (Chouldechova, 2017; Kleinberg et al., 2017): you cannot simultaneously satisfy demographic parity, equalized odds, and calibration when base rates differ across groups. Any fairness intervention involves choosing which definition to prioritize.</p>

    <h2>Mitigation Approaches</h2>
    <p>Pre-processing: modify the training data to reduce bias (resampling, reweighting, fairness-aware representation learning). In-processing: add fairness constraints to the training objective. Post-processing: adjust decision thresholds by group after training. Each approach has tradeoffs between fairness metric satisfaction, overall accuracy, and computational cost.</p>

    <h2>The Limits</h2>
    <p>Technical bias mitigation is necessary but not sufficient. No amount of debiasing can compensate for fundamentally flawed problem framing. Predicting who will be a good employee from historical data assumes the historical selection process was legitimate. Using arrest records as a proxy for criminality builds in the biases of policing. Sometimes the answer isn't "debias this model better" but "don't build this model at all." ETH-410 at Meridian AI examines these limits through detailed case studies.</p>

