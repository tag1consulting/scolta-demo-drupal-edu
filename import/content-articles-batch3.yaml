- title: "The Linear Algebra Every ML Engineer Actually Needs"
  type: resource_article
  school: "School of Foundations & Mathematics"
  difficulty: "Introductory"
  related_program_title: "MS in Mathematical Foundations of AI"
  topics:
    - "Mathematics & Foundations"
  body: |
    <h2>What to Learn vs. What to Skip</h2>
    <p>A typical linear algebra course covers abstract vector spaces, determinants, and theoretical proofs. Machine learning uses a specific subset of linear algebra: mostly operations on matrices and vectors that show up repeatedly. This article identifies what actually matters for ML practitioners, explains why, and points to where you'll encounter each concept.</p>

    <h2>Matrix Multiplication: The Foundation</h2>
    <p>Almost everything in deep learning is matrix multiplication. A fully connected layer: Y = XW + b, where X is the input matrix (batch_size × features), W is the weight matrix (features × outputs). An attention mechanism: Q·K^T / sqrt(d_k). The forward pass of a transformer is a sequence of matrix multiplications with nonlinearities between them.</p>
    <p>You need to be fluent with: matrix dimensions and why they have to be compatible, the transpose operation, batch matrix multiplication (processing many matrices simultaneously), and the computational cost O(m×n×k) for multiplying an (m×k) matrix by a (k×n) matrix.</p>

    <h2>Eigenvalues and Eigenvectors</h2>
    <p>An eigenvector of matrix A is a vector v such that Av = λv — the matrix transforms it only by scaling (by eigenvalue λ), not by rotation. This shows up in ML through: PCA (principal components are eigenvectors of the covariance matrix), analyzing gradient flow (eigenvalues of the Hessian determine optimization curvature), and understanding why some layers have better gradient propagation than others.</p>

    <h2>Singular Value Decomposition (SVD)</h2>
    <p>SVD decomposes any matrix A = UΣV^T where U and V are orthogonal and Σ is diagonal. This is the factorization that underlies: data compression (keep only the top-k singular vectors), understanding matrix rank, LoRA fine-tuning (which approximates weight update matrices as low-rank = low-k SVD), and noise filtering. The singular values in Σ tell you the "intrinsic dimensionality" of the information in a matrix.</p>

    <h2>Norms and Distances</h2>
    <p>The L2 norm ||v||₂ = sqrt(Σ vᵢ²) is the standard Euclidean distance. It appears everywhere: gradient clipping (||∇||₂), regularization (L2/weight decay adds ||W||₂² to the loss), cosine similarity (measuring semantic similarity in embedding spaces), and matrix norms (measuring how much a transformation stretches vectors).</p>
    <p>The L1 norm ||v||₁ = Σ |vᵢ| produces sparsity when used as a regularizer (Lasso regression). Understanding when to use L1 vs. L2 regularization requires understanding how these norms penalize different parameter configurations.</p>

    <h2>Gradients and the Jacobian</h2>
    <p>Backpropagation computes gradients: for a scalar loss L and a parameter vector θ, ∇L is the vector of partial derivatives ∂L/∂θᵢ. For vector-valued functions, the Jacobian J[i,j] = ∂fᵢ/∂xⱼ is the matrix of all partial derivatives. Chain rule for matrices (Jacobian chain rule) is how backprop flows through multiple layers.</p>
    <p>You don't need to compute Jacobians by hand, but understanding what they are — and that PyTorch's autograd is computing them efficiently — is essential for debugging gradient issues and understanding why certain architectures train better than others.</p>

- title: "Gradient Descent: From Intuition to Implementation"
  type: resource_article
  school: "School of Foundations & Mathematics"
  difficulty: "Introductory"
  topics:
    - "Mathematics & Foundations"
  body: |
    <h2>The Mountain in the Dark</h2>
    <p>Optimization in machine learning is like trying to find the lowest point in a mountain range while blindfolded. You can feel the slope under your feet (the gradient), but you can't see the landscape. Gradient descent is the simplest strategy: always step in the direction that slopes downward. This simple idea, combined with careful tuning and clever variants, is how virtually all neural networks are trained.</p>

    <h2>Vanilla Gradient Descent</h2>
    <p>The basic update rule:</p>
    <pre><code>θ ← θ - η ∇_θ L(θ)</code></pre>
    <p>Where η is the learning rate and ∇_θ L is the gradient of the loss with respect to parameters. Take small steps in the direction of steepest descent. The learning rate η is the most critical hyperparameter: too large and training diverges; too small and training is impossibly slow.</p>
    <p>For a quadratic loss (the simplest case), gradient descent converges geometrically: the error multiplies by (1 - ηλ) at each step, where λ is the smallest eigenvalue of the Hessian. Optimal convergence rate requires η = 2/(λ_min + λ_max), which requires knowing the Hessian's spectrum — not practical for neural networks.</p>

    <h2>Stochastic Gradient Descent</h2>
    <p>Computing the exact gradient requires evaluating the loss over the full dataset — expensive for millions of examples. SGD (Stochastic Gradient Descent) approximates the gradient using a random mini-batch:</p>
    <pre><code>∇̃L ≈ (1/B) Σ_{i∈batch} ∇L(xᵢ, yᵢ; θ)</code></pre>
    <p>This is noisy but much faster per step than full-batch gradient descent. Surprisingly, SGD's noise is often beneficial: it acts as regularization, helps escape sharp minima, and is thought to bias optimization toward flatter minima that generalize better (the "flat minima" hypothesis).</p>

    <h2>Momentum</h2>
    <p>SGD oscillates in directions of high curvature. Momentum smooths this by accumulating a velocity vector that decays over time:</p>
    <pre><code>v ← μv - η∇L
    θ ← θ + v</code></pre>
    <p>With momentum μ = 0.9, the optimizer accumulates gradients from the past ~10 steps, dampening oscillations and enabling larger effective learning rates. Nesterov momentum computes the gradient slightly ahead of the current position for better theoretical convergence.</p>

    <h2>Adam and AdamW</h2>
    <p>Adam adapts the learning rate per parameter based on estimates of first and second moments of the gradient:</p>
    <pre><code>m ← β₁m + (1-β₁)g      # first moment (mean)
    v ← β₂v + (1-β₂)g²     # second moment (variance)
    m̂ = m/(1-β₁ᵗ)          # bias correction
    v̂ = v/(1-β₂ᵗ)          # bias correction
    θ ← θ - η m̂/(√v̂ + ε)</code></pre>
    <p>Parameters with consistently large gradients get smaller effective learning rates (v̂ grows large). Parameters with small or noisy gradients get larger effective learning rates. This automatic adaptation is why Adam usually works better than SGD without careful tuning.</p>
    <p>AdamW (Loshchilov &amp; Hutter, 2019) fixes a subtle bug in L2 regularization with Adam: instead of adding the regularization term to the gradient (which Adam downscales), AdamW applies weight decay directly to the parameters. This produces better regularization and is the default optimizer for most large model training.</p>

- title: "Information Theory for Machine Learning Practitioners"
  type: resource_article
  school: "School of Foundations & Mathematics"
  difficulty: "Intermediate"
  topics:
    - "Mathematics & Foundations"
  body: |
    <h2>Why Information Theory Matters for ML</h2>
    <p>Shannon's information theory, developed in 1948 for communications engineering, turns out to be deeply connected to machine learning. Cross-entropy — the standard loss function for classification — is an information-theoretic concept. The KL divergence that appears in VAEs, RL, and alignment training is from information theory. The mutual information used to analyze what neural networks learn is from information theory. Understanding these connections gives you a much deeper understanding of why standard ML methods work.</p>

    <h2>Entropy: Measuring Uncertainty</h2>
    <p>Shannon entropy measures the average information content of a random variable:</p>
    <pre><code>H(X) = -Σ_x p(x) log p(x)</code></pre>
    <p>High entropy = high uncertainty. A fair coin has entropy 1 bit. A two-headed coin has entropy 0 (no uncertainty). A uniform distribution over 256 outcomes has entropy 8 bits.</p>
    <p>In ML: model uncertainty (how uncertain is the model about this prediction?) is related to entropy of the output distribution. Entropy maximization in SAC (reinforcement learning) explicitly rewards high-entropy policies. The entropy of the training data distribution affects how hard the learning problem is.</p>

    <h2>Cross-Entropy: The Standard Loss Function</h2>
    <p>Cross-entropy H(p, q) measures the expected log-loss when using distribution q to encode events drawn from distribution p:</p>
    <pre><code>H(p, q) = -Σ_x p(x) log q(x)</code></pre>
    <p>In classification: p is the true distribution (one-hot label), q is the model's predicted distribution. Minimizing cross-entropy is exactly maximum likelihood estimation — you're finding model parameters that make the training data most likely. Cross-entropy = entropy + KL divergence: H(p, q) = H(p) + KL(p||q).</p>

    <h2>KL Divergence: Measuring Distribution Difference</h2>
    <p>KL divergence (Kullback-Leibler divergence) measures how much one distribution differs from another:</p>
    <pre><code>KL(p||q) = Σ_x p(x) log(p(x)/q(x))</code></pre>
    <p>It's not symmetric (KL(p||q) ≠ KL(q||p)) and can be interpreted as the extra bits needed to encode samples from p when using an optimal code for q. KL appears everywhere in ML: RLHF/PPO uses KL as a constraint between the policy being trained and the reference policy; VAEs minimize KL between the posterior and the prior; information bottleneck theory uses KL to formalize compression.</p>

    <h2>Mutual Information: What's Shared Between Variables</h2>
    <p>Mutual information measures how much information X and Y share:</p>
    <pre><code>I(X;Y) = KL(p(x,y) || p(x)p(y)) = H(X) - H(X|Y)</code></pre>
    <p>High mutual information = knowing Y tells you a lot about X. Research on "what neural networks learn" often uses mutual information between representations and input/output: good representations should have high I(representation; label) and low I(representation; spurious features). The information bottleneck principle proposes that good representations compress away irrelevant information while retaining task-relevant information.</p>

- title: "Probability Theory for Deep Learning"
  type: resource_article
  school: "School of Foundations & Mathematics"
  difficulty: "Intermediate"
  topics:
    - "Mathematics & Foundations"
  body: |
    <h2>Why Probability Is Non-Negotiable</h2>
    <p>Deep learning is fundamentally probabilistic: models output probability distributions, loss functions come from probability theory, regularization has Bayesian interpretations, and uncertainty quantification requires probabilistic reasoning. You can write code without understanding probability, but you can't debug, evaluate, or improve systems without it.</p>

    <h2>Basic Probability</h2>
    <p>A probability distribution assigns probabilities to events such that all probabilities are non-negative and sum to 1. Key distributions for ML:</p>
    <ul>
      <li><strong>Gaussian (Normal):</strong> Most common. Central limit theorem says sums of random variables converge to Gaussian. Shows up in weight initialization, noise models, VAE priors.</li>
      <li><strong>Bernoulli/Categorical:</strong> Binary and multi-class classification outputs. Categorical cross-entropy is the natural loss for categorical distributions.</li>
      <li><strong>Uniform:</strong> Used for random initialization, some regularization.</li>
      <li><strong>Dirichlet:</strong> Distribution over probability vectors; used in topic models and Bayesian neural networks.</li>
    </ul>

    <h2>Bayes' Theorem</h2>
    <p>Bayes' theorem connects prior beliefs to updated beliefs after observing data:</p>
    <pre><code>p(θ|D) = p(D|θ) p(θ) / p(D)</code></pre>
    <p>Posterior ∝ Likelihood × Prior. Maximum likelihood estimation (what most deep learning does) maximizes p(D|θ) ignoring the prior. Maximum a posteriori (MAP) estimation maximizes p(D|θ)p(θ) — which is ML with regularization. L2 regularization corresponds to a Gaussian prior on weights; L1 regularization corresponds to a Laplace prior.</p>

    <h2>Expectation, Variance, and Moments</h2>
    <p>Expected value E[X] = Σ x p(x) is the probability-weighted average. Variance Var[X] = E[(X-E[X])²] = E[X²] - (E[X])² measures spread. Standard deviation is the square root of variance.</p>
    <p>In training: batch statistics (used in batch normalization) are estimates of population means and variances. Gradient variance is a key optimization concept — high variance means unreliable gradient estimates and unstable training. Adam's adaptive learning rates reduce the effect of variance in gradient estimates.</p>

    <h2>Monte Carlo Methods</h2>
    <p>Many integrals and expectations in ML can't be computed analytically. Monte Carlo methods approximate them by sampling: E[f(X)] ≈ (1/N) Σ f(xᵢ) where xᵢ ~ p(X). The law of large numbers guarantees convergence. Applications: SGD (Monte Carlo estimate of gradient), REINFORCE (Monte Carlo estimate of policy gradient), variational inference (Monte Carlo estimation of the ELBO).</p>

