- title: "Scolta: A Case Study in Practical AI Search"
  type: resource_article
  school: "School of Applied Intelligence"
  difficulty: "Introductory"
  related_program_title: "Certificate in AI-Powered Search & Information Retrieval"
  topics:
    - "Search & Information Retrieval"
    - "Large Language Models"
  body: |
    <h2>The Problem Scolta Solves</h2>
    <p>Most websites have mediocre search. Users type queries, get keyword-matched results that miss the semantic meaning, and give up. The obvious solution — vector search and dense retrieval — requires significant infrastructure investment: embedding pipelines, vector databases, reranking services, and ongoing maintenance. For the millions of websites on CMS platforms like Drupal and WordPress, this is often impractical.</p>
    <p>Scolta, developed by Tag1 Consulting, takes a different approach: layer AI capabilities onto existing keyword search infrastructure without requiring vector databases. The result is a system that dramatically improves search quality for real-world content websites, built on technology that teams without specialized ML infrastructure can deploy and maintain.</p>

    <h2>Architecture Overview</h2>
    <p>Scolta's architecture has three core components built on top of Pagefind (a static site search system):</p>
    <ol>
      <li><strong>LLM Query Expansion:</strong> Before the query hits the search index, Scolta sends it to the Claude API to generate a richer query: synonyms, related terms, alternative phrasings, and domain-specific vocabulary the user might not have used. A query for "cancel subscription" becomes a richer query that also matches "terminate membership," "stop renewal," and "deactivate account."</li>
      <li><strong>Pagefind BM25 Search:</strong> The expanded query runs against a static Pagefind index — fast, client-side, no server required. The expansion dramatically improves BM25 recall without requiring semantic embeddings.</li>
      <li><strong>AI Overview Generation:</strong> After retrieval, Scolta sends the top results to Claude to generate a synthesized AI overview — a paragraph-length answer to the user's question, with citations to specific pages. This is what users see first, above the ranked results list.</li>
    </ol>

    <h2>What Makes Scolta Distinctive</h2>
    <p>The key architectural insight is pragmatic: most AI search papers optimize for absolute performance on academic benchmarks. Scolta optimizes for practicality for real-world deployments. This means:</p>
    <ul>
      <li><strong>No embedding infrastructure:</strong> Pagefind is static site search — it runs in the browser with no server-side indexing infrastructure. Scolta adds AI without adding complexity.</li>
      <li><strong>Incremental cost:</strong> One LLM API call per search query for expansion + one for the AI overview. Total marginal cost: under $0.05 per query at 2026 API prices.</li>
      <li><strong>Works with existing content:</strong> No changes to how content is structured or stored. Scolta builds on the existing Drupal (or other CMS) content model.</li>
      <li><strong>Transparent AI:</strong> The AI overview cites specific pages. Users see where the answer came from and can click through to verify.</li>
    </ul>

    <h2>Evaluation: Does It Work?</h2>
    <p>Internal evaluation comparing Scolta search to baseline Pagefind-only search on representative query sets showed: 35-45% improvement in NDCG@10 (a standard IR quality metric) and significantly higher user satisfaction ratings. The improvement is largest for natural-language and conceptual queries — exactly the cases where pure BM25 performs worst.</p>

    <h2>Teaching With Scolta</h2>
    <p>The IR-290 capstone at Meridian AI uses Scolta's open architecture as both a learning tool and a deployment option. Students who deploy Scolta implement LLM-based query expansion and AI overview generation from scratch, then compare their results to the production Scolta system. This hands-on approach produces deep understanding of how AI search systems work — from the theory through the implementation through the evaluation.</p>
    <p>The full technical approach to AI-powered search, including Scolta's design, is documented in Tag1 Consulting's "Practical Path to AI Search" series at tag1.com/how-to/.</p>

- title: "Search Beyond Keywords: Query Expansion and Semantic Understanding"
  type: resource_article
  school: "School of Applied Intelligence"
  difficulty: "Intermediate"
  related_program_title: "Certificate in AI-Powered Search & Information Retrieval"
  topics:
    - "Search & Information Retrieval"
    - "Natural Language Processing"
  body: |
    <h2>The Vocabulary Mismatch Problem</h2>
    <p>The fundamental challenge in information retrieval is vocabulary mismatch: users and documents use different words to describe the same concept. A user searching for "myocardial infarction" might find documents that only use "heart attack." A user searching for "how to delete my account" might miss the relevant page titled "Account Deactivation Instructions." Traditional BM25 search cannot bridge these gaps; it finds documents containing the query terms, not documents about the query concept.</p>
    <p>Query expansion is the classic IR solution: broaden the query to include related terms that might appear in relevant documents. Modern LLM-based expansion makes this dramatically more effective.</p>

    <h2>Classic Query Expansion</h2>
    <p>Traditional expansion methods:</p>
    <ul>
      <li><strong>Thesaurus expansion:</strong> Add WordNet synonyms for each query term. Simple but limited — thesauri don't capture domain-specific synonymy or informal language.</li>
      <li><strong>Pseudo-relevance feedback (PRF):</strong> Retrieve the top K results for the original query, extract the most important terms from those results, add them to the query, re-retrieve. Improves recall for good initial results but amplifies errors for bad ones.</li>
      <li><strong>Query log mining:</strong> Learn query reformulations from users who reformulate unsuccessful queries. Requires large query logs.</li>
    </ul>

    <h2>LLM-Based Query Expansion</h2>
    <p>LLMs can generate query expansions that incorporate the query's semantic meaning, domain context, and likely user intent. A well-prompted LLM given "cancel subscription" can generate: "unsubscribe, cancel membership, stop billing, terminate account, end automatic renewal, deactivate subscription, stop recurring payment." These expansions go beyond word-level synonymy to capture conceptual and task-level alternatives.</p>
    <p>The Scolta approach uses a specific prompt format that asks the model to consider what a user with this query is trying to accomplish, what vocabulary the relevant documents might use, and what alternative phrasings might find the relevant content. The resulting expansion terms are concatenated to the original query for BM25 retrieval.</p>

    <h2>Semantic Reranking</h2>
    <p>Even after query expansion, BM25 ranking may not place the most semantically relevant documents at the top. Cross-encoder rerankers address this: given the (query, document) pair, a cross-encoder reads both together and scores relevance more accurately than BM25's term-matching approach.</p>
    <p>Typical workflow: BM25+expansion retrieves 100 candidates; a cross-encoder (typically a BERT-family model fine-tuned on MS MARCO) reranks the top 20. This "retrieve-then-rerank" pipeline achieves near-vector-search quality with BM25's indexing infrastructure.</p>

    <h2>When Expansion Hurts</h2>
    <p>Query expansion can degrade performance for navigational queries (the user wants a specific page) and for very specific technical queries where the exact terms matter. An expansion of "git-log" might add "version control history" and "commit log," which could surface less relevant documentation pages. Controlling expansion aggressiveness — expanding more for natural-language queries, less for technical term queries — is an important part of production query expansion implementation.</p>

- title: "MLOps: From Jupyter Notebook to Production Pipeline"
  type: resource_article
  school: "School of Applied Intelligence"
  difficulty: "Intermediate"
  related_program_title: "MS in AI Engineering & MLOps"
  topics:
    - "MLOps & Infrastructure"
  body: |
    <h2>The 90% Problem</h2>
    <p>Getting a machine learning model to work in a Jupyter notebook is relatively easy. Getting it into production, keeping it running reliably, and maintaining it over time is where most AI projects fail. Studies consistently show that 80-90% of ML models never make it to production, and most of those that do fail within months due to data drift, infrastructure issues, or organizational problems.</p>
    <p>MLOps (Machine Learning Operations) is the discipline that closes this gap — applying DevOps principles and practices to the ML lifecycle to build systems that actually work in production.</p>

    <h2>The Full ML Lifecycle</h2>
    <p>Production ML involves far more than model training:</p>
    <ol>
      <li><strong>Data collection and versioning:</strong> Data changes over time. Without versioning (DVC, LakeFS), you can't reproduce results or debug regressions.</li>
      <li><strong>Feature engineering:</strong> Feature stores (Feast, Tecton) provide consistent feature computation between training and serving — a common source of training-serving skew.</li>
      <li><strong>Training infrastructure:</strong> Experiment tracking (MLflow, Weights &amp; Biases), distributed training, GPU resource management.</li>
      <li><strong>Model registry:</strong> Version and stage management for trained models; audit trail of what was deployed when.</li>
      <li><strong>Serving infrastructure:</strong> Model servers, autoscaling, load balancing, A/B testing.</li>
      <li><strong>Monitoring:</strong> Data drift detection, model performance monitoring, alerting.</li>
      <li><strong>Retraining:</strong> Automated triggering of retraining when drift is detected; CI/CD for ML.</li>
    </ol>

    <h2>Training-Serving Skew: The Silent Killer</h2>
    <p>Training-serving skew — where the data distribution at serving time differs from training time — is the most common production ML failure mode. It occurs when: features are computed differently in training and serving (timestamp handling, categorical encoding, scaling), training data is not representative of production data, or the production data distribution shifts over time.</p>
    <p>Preventing skew requires: using the same feature computation code in training and serving (feature stores solve this), testing on held-out data from the production distribution, and monitoring feature distributions in production.</p>

    <h2>Experiment Tracking</h2>
    <p>Every training run should be tracked: hyperparameters, dataset version, training code version, evaluation metrics, system metrics (GPU utilization, memory, time). MLflow and Weights &amp; Biases are the industry standards. Without tracking, you can't reproduce previous results, compare experiments, or understand why model performance changed.</p>

    <h2>CI/CD for ML</h2>
    <p>Automated testing for ML pipelines must handle the stochastic nature of training: model performance will vary between runs. Good ML CI/CD: run automated tests on small data to detect code regressions; use statistical tests to determine whether metric changes are significant; automate deployment when all tests pass and performance meets thresholds. The Meridian AI MS in AI Engineering covers complete CI/CD pipeline implementation as part of MLE-440.</p>

- title: "Vector Databases: When to Use Them and When Not To"
  type: resource_article
  school: "School of Applied Intelligence"
  difficulty: "Intermediate"
  topics:
    - "Search & Information Retrieval"
    - "MLOps & Infrastructure"
  body: |
    <h2>The Vector Database Hype Cycle</h2>
    <p>In 2023, vector databases became one of the most hyped technologies in the AI stack. Pinecone, Weaviate, Qdrant, Milvus, Chroma, and a dozen others competed for developer mindshare. Embedding pipelines became a standard component of every AI application architecture. And then the correction: many teams that had adopted vector databases found they were solving problems they didn't have, adding complexity without proportional benefit.</p>
    <p>This article provides a clear-eyed view of when vector databases genuinely improve search quality and when simpler alternatives perform as well or better.</p>

    <h2>What Vector Search Is</h2>
    <p>Dense retrieval converts both queries and documents into dense vector representations (embeddings) using a neural encoder (e.g., E5, BGE, OpenAI ada-002). Retrieval finds the nearest neighbors in embedding space — documents most semantically similar to the query, regardless of exact term overlap. This solves the vocabulary mismatch problem that BM25 struggles with.</p>

    <h2>When Vector Search Genuinely Helps</h2>
    <ul>
      <li><strong>Short, ambiguous queries on large corpora:</strong> "Something about risk management" — BM25 requires matching terms; dense retrieval finds related concepts.</li>
      <li><strong>Cross-lingual search:</strong> Multilingual embeddings (mE5, LaBSE) can find relevant documents in different languages than the query.</li>
      <li><strong>Product/recommendation search:</strong> "Show me shirts like this one" — similarity-based retrieval with image or product embeddings.</li>
      <li><strong>High-value, low-query-volume applications:</strong> Where the cost of false negatives (missing relevant documents) is high enough to justify the infrastructure overhead.</li>
    </ul>

    <h2>When BM25 + AI Expansion Beats Vector Search</h2>
    <p>Counterintuitively, pure vector search often underperforms hybrid approaches that combine BM25 with query expansion or reranking:</p>
    <ul>
      <li>For technical queries with specific terminology, BM25 exact matching outperforms semantic search which may find "related" but not the specific document</li>
      <li>For named entity search (specific products, people, error codes), term matching is more reliable than semantic embedding</li>
      <li>For small-to-medium corpora (&lt;1M documents), BM25+expansion+reranking typically matches vector search quality at lower infrastructure cost</li>
    </ul>

    <h2>The Pragmatic Decision</h2>
    <p>Practical guidance:</p>
    <ol>
      <li>Start with BM25. Measure your baseline quality on representative queries.</li>
      <li>Add LLM query expansion. Measure improvement. Cost: ~$0.001/query.</li>
      <li>Add a cross-encoder reranker. Measure improvement. Cost: compute to run encoder on top-K results.</li>
      <li>If you still need better recall, add dense retrieval as a second retrieval path (hybrid search with RRF). Cost: embedding infrastructure.</li>
      <li>Only replace BM25 entirely with vector search if you have a strong reason specific to your use case.</li>
    </ol>
    <p>Most teams that follow this progression find they achieve their quality targets at step 2 or 3, never needing full vector search infrastructure.</p>

- title: "The Cost of AI: GPU Hours, API Calls, and Budget Reality"
  type: resource_article
  school: "School of Applied Intelligence"
  difficulty: "Introductory"
  topics:
    - "MLOps & Infrastructure"
  body: |
    <h2>The Expensive Reality</h2>
    <p>AI is expensive. Frontier model training runs cost tens to hundreds of millions of dollars. API calls to production models cost real money per token. GPU cloud instances cost $2-8/hour per GPU. A company building AI products needs to think seriously about costs — not as an afterthought, but as a core architectural concern. This article provides concrete numbers and decision frameworks for managing AI costs in production.</p>

    <h2>Training Cost: The Big Numbers</h2>
    <p>Estimated training costs for recent major models (based on public information and inference from available compute pricing and FLOPs estimates):</p>
    <ul>
      <li>GPT-3 (175B, 2020): ~$5M</li>
      <li>PaLM (540B, 2022): ~$10-20M</li>
      <li>Llama 3 70B (2024): ~$2-5M (estimated; Meta hasn't disclosed)</li>
      <li>DeepSeek V3 (2024): ~$5.5M (disclosed by DeepSeek)</li>
    </ul>
    <p>For most applications, you're not training frontier models — you're using them. But even fine-tuning has significant costs. LoRA fine-tuning of a 7B model on a consumer A100 runs 1-4 hours; on 8×H100s, it's minutes. Cloud H100 costs: $2.50-6/GPU-hour depending on provider and commitment level.</p>

    <h2>Inference API Cost: Per-Token Economics</h2>
    <p>API costs (approximate, mid-2026 pricing — subject to rapid change as models become more efficient):</p>
    <ul>
      <li>Claude 3.5 Sonnet: ~$3/M input tokens, ~$15/M output tokens</li>
      <li>GPT-4o: ~$5/M input, ~$15/M output</li>
      <li>Claude 3 Haiku: ~$0.25/M input, ~$1.25/M output</li>
      <li>GPT-4o mini: ~$0.15/M input, ~$0.60/M output</li>
      <li>Llama 3.1 70B (via Groq): ~$0.59/M input, ~$0.79/M output</li>
    </ul>
    <p>Key insight: the cost difference between frontier and commodity models is 10-50×. For high-volume applications, this difference is critical. A feature that makes 10M API calls/month at $5/M = $50K/month. The same feature at $0.15/M = $1.5K/month.</p>

    <h2>The Model Selection Cost Tradeoff</h2>
    <p>The key engineering decision: which model is good enough for this task? "Good enough" is the operative phrase. Using a frontier model for tasks that a cheaper model handles adequately wastes money. Using a cheap model for tasks that require frontier capabilities wastes user experience. Build a quality evaluation for each use case and measure whether cheaper models meet your quality bar.</p>

    <h2>Cost Optimization Strategies</h2>
    <ul>
      <li><strong>Caching:</strong> Cache LLM responses for repeated queries. Effective for search (same queries recur) and any application with repeated inputs. Scolta caches AI overviews for 30 days — most search queries recur frequently enough for this to significantly reduce per-query cost.</li>
      <li><strong>Model routing:</strong> Use a cheap model for simple requests; route complex requests to expensive models. Requires a classifier to determine request difficulty.</li>
      <li><strong>Context optimization:</strong> Input tokens cost money. Compress prompts, summarize conversation history, use RAG to provide targeted context rather than stuffing everything.</li>
      <li><strong>Batching:</strong> Group requests for batch processing where latency allows. Many providers offer batch APIs at 50% discount.</li>
      <li><strong>Fine-tuning for efficiency:</strong> A fine-tuned smaller model may match a prompted larger model at 10× lower inference cost.</li>
    </ul>

- title: "Edge AI: Running Models on Phones, Drones, and IoT Devices"
  type: resource_article
  school: "School of Applied Intelligence"
  difficulty: "Intermediate"
  topics:
    - "Edge AI"
    - "MLOps & Infrastructure"
  body: |
    <h2>Why Edge Matters</h2>
    <p>Most AI discussion assumes cloud inference: send data to a server, get results back. This works for many applications but fails for others: when latency is critical (real-time robot control), when connectivity is unreliable (drones in remote areas), when privacy is required (medical devices that can't send patient data to the cloud), or when cost makes continuous cloud API calls impractical (10 million IoT sensors).</p>
    <p>Edge AI runs models on the device — phone, drone, microcontroller, embedded system. Getting useful AI to run efficiently on constrained hardware is a significant engineering challenge with specialized tools and techniques.</p>

    <h2>The Hardware Landscape</h2>
    <ul>
      <li><strong>Mobile SoCs:</strong> Apple A18, Snapdragon 8 Gen 4, Samsung Exynos — all include dedicated Neural Processing Units (NPUs) that provide 10-40 TOPS (tera-operations per second) of neural network compute. Modern smartphones can run 7B LLMs (quantized) at 5-15 tokens/second.</li>
      <li><strong>Edge GPUs:</strong> NVIDIA Jetson Orin (2-275 TOPS depending on module); designed for robotics, drones, and smart cameras. Full PyTorch and TensorRT support.</li>
      <li><strong>Microcontrollers (MCU):</strong> STM32, Arduino Nano 33, Raspberry Pi Pico — milliwatts of power, kilobytes of RAM. TinyML models run classification and anomaly detection; not LLMs.</li>
      <li><strong>FPGAs:</strong> Xilinx/AMD and Intel FPGAs enable custom neural network inference at extremely low latency and power. Used in specialized industrial and medical applications.</li>
    </ul>

    <h2>Quantization for Edge</h2>
    <p>Standard ML models use 32-bit or 16-bit floating point weights. Edge hardware often works best with 8-bit integer (INT8) or 4-bit quantization. INT8 quantization reduces memory 4× (vs float32) and enables specialized integer MAC units that are 4-8× more efficient than float units. For LLMs on mobile, GGUF format (llama.cpp) with 4-bit or 5-bit quantization is standard.</p>

    <h2>Model Architecture for Edge</h2>
    <p>Edge deployment benefits from architectures designed for efficiency: MobileNet, EfficientNet, MobileViT for vision; MobileLLM, Phi-3-mini for language. Knowledge distillation — training a smaller "student" model to mimic a larger "teacher" — produces compact models that punch above their parameter count. Neural architecture search (NAS) finds Pareto-optimal architectures for specific hardware targets.</p>

    <h2>Practical Deployment</h2>
    <p>Key tools: ONNX (model export format), TensorFlow Lite (mobile and embedded), Core ML (Apple devices), ONNX Runtime (cross-platform), llama.cpp (LLM inference on CPUs and Apple Silicon). For Android, Google's AI Edge (formerly LiteRT) provides hardware-accelerated inference on Qualcomm, MediaTek, and Google Tensor NPUs. Dr. Lin's research group at Meridian AI focuses on NAS methods for these edge hardware targets.</p>

- title: "How Tag1 Uses AI Across Its Entire Business"
  type: resource_article
  school: "School of Applied Intelligence"
  difficulty: "Introductory"
  topics:
    - "MLOps & Infrastructure"
    - "Search & Information Retrieval"
  body: |
    <h2>Beyond the Hype: AI as Operational Reality</h2>
    <p>Most AI case studies describe spectacular demonstrations. Fewer document the more interesting story: how an organization systematically integrates AI into its actual operations, identifies what works, manages the failures, and builds institutional knowledge about applying AI effectively. Tag1 Consulting, the company behind Scolta, has published extensively about their applied AI journey (tag1.com/blog/tag1-applied-ai/), making them an unusually transparent case study for how a technology consultancy uses AI in the real world.</p>

    <h2>AI for Software Development</h2>
    <p>Tag1 uses Claude Code and GitHub Copilot across their development team for code generation, code review, test writing, and documentation. Their published findings (consistent with industry surveys): AI pair programming increases individual developer productivity by 20-40% on routine tasks; the gains are most pronounced for boilerplate, documentation, and test cases; senior developers benefit as much as junior ones, but for different tasks (complex refactoring vs. routine implementation).</p>
    <p>They've also noted the risks: AI-generated code requires review; models confidently produce plausible but incorrect implementations; junior developers who rely too heavily on AI may not develop the debugging instincts that come from writing code manually. Their approach: AI is a tool, not a replacement for engineering judgment.</p>

    <h2>AI for Client Delivery</h2>
    <p>Scolta itself is Tag1's primary AI product — an AI-enhanced search system for Drupal and other CMS platforms. The development of Scolta was itself an exercise in applying AI: using LLMs to evaluate search quality, generate test queries, and identify gaps in coverage. The result is a product where AI was used throughout the development process as well as in the final product.</p>
    <p>Beyond Scolta, Tag1 uses AI for: generating content migration scripts (tedious and error-prone by hand), automated accessibility auditing (LLMs can evaluate WCAG compliance more systematically than manual review), and performance optimization recommendations (static analysis + LLM review catches issues that automated tools miss).</p>

    <h2>AI for Knowledge Management</h2>
    <p>Like most professional services firms, Tag1 accumulates institutional knowledge that's hard to transfer. They've experimented with AI-assisted knowledge retrieval: building a private RAG system over their internal documentation, project notes, and code repositories that allows team members to query the organization's accumulated expertise. Early results are promising for onboarding and knowledge retrieval; less clear for truly novel problem solving.</p>

    <h2>What the Case Study Teaches</h2>
    <p>Three lessons from Tag1's AI integration journey that generalize beyond their specific context:</p>
    <ol>
      <li><strong>Measure before and after:</strong> Impressions of productivity gain are not measurements. Tag1 tracks specific metrics (time to complete tasks, defect rates, client satisfaction) before and after AI tool adoption.</li>
      <li><strong>The workflow matters as much as the tool:</strong> The same LLM produces very different outcomes depending on how it's integrated into existing workflows. Treating AI as a chat interface produces different results than integrating it into specific workflow steps.</li>
      <li><strong>Skills compound:</strong> Teams that invest in prompt engineering and AI workflow design build compound advantages. The first month of AI adoption is often disappointing; the sixth month, after workflow optimization, is dramatically better.</li>
    </ol>
    <p>This article is assigned reading in MLE-401 and as supplementary material in ETH-440 as an example of responsible, measured AI adoption in a professional context.</p>

- title: "Building RAG Systems That Actually Work"
  type: resource_article
  school: "School of Applied Intelligence"
  difficulty: "Advanced"
  topics:
    - "Search & Information Retrieval"
    - "Large Language Models"
  body: |
    <h2>Why Most RAG Systems Disappoint</h2>
    <p>RAG (Retrieval-Augmented Generation) is conceptually simple: retrieve relevant documents, include them in the prompt, generate an answer. In practice, production RAG systems frequently disappoint: they miss relevant information, generate plausible-sounding wrong answers, fail on complex multi-hop questions, and hallucinate citations. Building RAG that actually works requires careful attention to each component of the pipeline.</p>

    <h2>The Retrieval Problem: The Most Common Failure</h2>
    <p>Most RAG failures are retrieval failures: the relevant information was in the corpus but wasn't retrieved. Common causes:</p>
    <ul>
      <li>Chunking strategy doesn't preserve context around relevant sentences</li>
      <li>Dense retrieval fails on technical terms and named entities</li>
      <li>Query is ambiguous or under-specified</li>
      <li>Relevant information is spread across multiple documents that aren't individually retrieved</li>
    </ul>
    <p>Diagnostics: log what's retrieved for each query. A significant fraction of user complaints should be attributable to retrieval failures, not generation failures. If the answer is in the retrieved context but the LLM missed it, that's a generation problem. If the answer was in the corpus but not retrieved, that's a retrieval problem — and more common.</p>

    <h2>Hybrid Retrieval in Practice</h2>
    <p>The practical recommendation: use BM25 + dense retrieval in parallel, combine with reciprocal rank fusion:</p>
    <pre><code>bm25_results = bm25.search(query, k=50)
    dense_results = vector_db.search(embed(query), k=50)
    combined = rrf_merge(bm25_results, dense_results)
    top_k = combined[:20]</code></pre>
    <p>RRF (Reciprocal Rank Fusion) is surprisingly effective: a simple weighted combination of rankings that outperforms most learned fusion approaches on standard benchmarks. The intuition: a document ranked highly by both systems is very likely to be relevant.</p>

    <h2>The Generation Problem: Hallucination and Attribution</h2>
    <p>Even with perfect retrieval, LLMs can hallucinate: generate factual claims not supported by the retrieved context. Mitigation strategies:</p>
    <ul>
      <li>Explicit grounding instructions: "Only use information from the provided documents. If the answer isn't in the documents, say so."</li>
      <li>Citation enforcement: "For each claim, cite the specific document it comes from."</li>
      <li>Faithfulness checking: Use a second LLM call to verify that each claim in the response is supported by the retrieved context.</li>
      <li>Conservative default: Instruct the model to prefer saying "I don't know" over speculating.</li>
    </ul>

    <h2>Evaluation: The Hardest Part</h2>
    <p>RAG evaluation requires measuring both retrieval quality (did we retrieve relevant documents?) and generation quality (did we generate a correct, faithful answer?). Standard approaches: RAGAS (RAG Assessment) framework evaluates faithfulness, answer relevance, context recall, and context precision. LLM-as-judge for generation quality evaluation scales better than human evaluation but introduces its own biases. Build a "golden set" of 100-200 (question, correct answer, source document) triples and measure against it systematically.</p>

- title: "AI in Healthcare: What's Real and What's Hype in 2026"
  type: resource_article
  school: "School of Applied Intelligence"
